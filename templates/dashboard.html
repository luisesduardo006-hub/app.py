<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; padding: 20px; display: flex; justify-content: center; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        .btn { display: block; padding: 12px; margin: 10px 0; text-decoration: none; color: white; border-radius: 5px; font-weight: bold; }
        .btn-excel { background: #1d6f42; }
        .btn-logout { background: #dc3545; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Hola, {{ nombre }}</h1>
        <p>Rol: {{ rol }}</p>
        
        <a href="{{ url_for('exportar_corte') }}" class="btn btn-excel">
            📊 Descargar Corte Excel
        </a>

        <a href="{{ url_for('logout') }}" class="btn btn-logout">Cerrar Sesión</a>
    </div>
</body>
</html>
