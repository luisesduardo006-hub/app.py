<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root { --accent: #00f2fe; --bg: #0f172a; }
        body { background: var(--bg); color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: rgba(255,255,255,0.05); padding: 30px; border-radius: 20px; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); text-align: center; width: 80%; max-width: 300px; }
        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; border: none; background: rgba(0,0,0,0.3); color: white; text-align: center; font-size: 20px; letter-spacing: 5px; }
        button { width: 100%; padding: 15px; border-radius: 10px; border: none; background: var(--accent); color: black; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h1 style="color: var(--accent);">V11</h1>
        <p>Introduce tu clave de acceso</p>
        <form action="/login" method="POST">
            <input type="password" name="clave" placeholder="****" required>
            <button type="submit">ENTRAR</button>
        </form>
    </div>
</body>
</html>
