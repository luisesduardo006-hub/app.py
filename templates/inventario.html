<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root { --accent: #00f2fe; --bg: #0f172a; }
        body { background: var(--bg); color: white; font-family: sans-serif; padding: 15px; }
        .card { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 15px; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: none; background: rgba(0,0,0,0.4); color: white; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; border-radius: 8px; border: none; background: var(--accent); color: black; font-weight: bold; }
        .prod-list { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 14px; }
    </style>
</head>
<body>
    <a href="/hub" style="color: var(--accent); text-decoration: none;">⬅ Volver</a>
    <h2>📦 Inventario</h2>

    <div class="card">
        <form action="/agregar_producto" method="POST">
            <input type="text" name="nombre" placeholder="Nombre (Ej: Sabritas)" required>
            <input type="number" step="0.01" name="precio" placeholder="Precio $" required>
            <input type="number" name="stock" placeholder="Stock (Vacio = Infinito)">
            <select name="unidad">
                <option value="PZ">Pieza (PZ)</option>
                <option value="KG">Kilo (KG)</option>
            </select>
            <button type="submit" class="btn">+ GUARDAR PRODUCTO</button>
        </form>
    </div>

    <div class="card">
        {% for p in productos %}
        <div class="prod-list">
            <span>{{ p.nombre }}</span>
            <b>${{ p.precio }} / {{ p.unidad }}</b>
            <span style="color: var(--accent);">Stock: {{ p.stock if p.stock != None else '∞' }}</span>
        </div>
        {% endfor %}
    </div>
</body>
</html>
